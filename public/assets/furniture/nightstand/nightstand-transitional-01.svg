<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 280" width="250" height="280">
  <!-- Top surface -->
  <rect x="15" y="20" width="220" height="18" rx="4" ry="4" fill="#A07850"/>
  <!-- Top surface highlight -->
  <rect x="20" y="22" width="200" height="8" rx="2" ry="2" fill="#B08860" opacity="0.5"/>
  <!-- Body -->
  <rect x="20" y="35" width="210" height="185" rx="4" ry="4" fill="#8B6840"/>
  <!-- Top drawer -->
  <rect x="30" y="45" width="190" height="70" rx="4" ry="4" fill="#9B7850"/>
  <!-- Top drawer pull -->
  <rect x="112" y="76" width="26" height="8" rx="3" ry="3" fill="#C0A070"/>
  <!-- Bottom drawer -->
  <rect x="30" y="125" width="190" height="80" rx="4" ry="4" fill="#9B7850"/>
  <!-- Bottom drawer pull -->
  <rect x="112" y="160" width="26" height="8" rx="3" ry="3" fill="#C0A070"/>
  <!-- Drawer divider shadow -->
  <rect x="30" y="113" width="190" height="4" rx="0" ry="0" fill="#6B5030"/>
  <!-- Bottom rail -->
  <rect x="20" y="218" width="210" height="16" rx="3" ry="3" fill="#7A5C35"/>
  <!-- Left front leg -->
  <rect x="32" y="228" width="22" height="42" rx="4" ry="4" fill="#9B7850"/>
  <!-- Right front leg -->
  <rect x="196" y="228" width="22" height="42" rx="4" ry="4" fill="#9B7850"/>
  <!-- Left back leg -->
  <rect x="46" y="228" width="14" height="32" rx="3" ry="3" fill="#7A5C35"/>
  <!-- Right back leg -->
  <rect x="190" y="228" width="14" height="32" rx="3" ry="3" fill="#7A5C35"/>
  <!-- Wood grain lines -->
  <line x1="20" y1="80" x2="210" y2="80" stroke="#7A5830" stroke-width="1" opacity="0.3"/>
</svg>
