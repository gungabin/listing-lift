<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 280" width="250" height="280">
  <!-- Table top (round) -->
  <ellipse cx="125" cy="80" rx="105" ry="30" fill="#8B6840"/>
  <!-- Table top surface highlight -->
  <ellipse cx="115" cy="72" rx="70" ry="18" fill="#A07850" opacity="0.4"/>
  <!-- Table edge -->
  <path d="M20,80 Q20,100 125,105 Q230,100 230,80" fill="#6B5030"/>
  <!-- Single pedestal stem -->
  <rect x="113" y="100" width="24" height="120" rx="8" ry="8" fill="#7A5C35"/>
  <!-- Pedestal base -->
  <path d="M75,220 L175,220 L195,250 L55,250 Z" fill="#6B5030"/>
  <!-- Base ellipse foot -->
  <ellipse cx="125" cy="250" rx="70" ry="18" fill="#5A4025"/>
  <!-- Wood grain detail on top -->
  <ellipse cx="125" cy="78" rx="75" ry="18" fill="none" stroke="#7A5830" stroke-width="1" opacity="0.3"/>
  <ellipse cx="125" cy="78" rx="50" ry="12" fill="none" stroke="#7A5830" stroke-width="1" opacity="0.2"/>
</svg>
